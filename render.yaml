# render.yaml — GeoCollect Field App Platform
# Mirrors the original GeoCollect render.yaml structure that deployed without payment.
# Render managed Postgres + Redis, all auto-wired via fromDatabase / fromService.

databases:
  - name: geocollect-postgres
    databaseName: geocollect
    user: geocollect
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: geocollect-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # ── Fastify API ───────────────────────────────────────────────────────────
  - type: web
    name: geocollect-api
    runtime: node
    plan: starter
    rootDir: api
    buildCommand: npm ci
    startCommand: node src/db/migrate.js && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: geocollect-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: APP_URL
        value: "https://geocollect-field-app.onrender.com"
      - key: MINIO_ENDPOINT
        value: ""
      - key: MINIO_ACCESS_KEY
        value: ""
      - key: MINIO_SECRET_KEY
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: "noreply@geocollect.app"
      - key: API_KEY_RATE_LIMIT_PER_HOUR
        value: "1000"
      - key: WEBHOOK_MAX_FAILURES
        value: "10"

  # ── FastAPI Geo API ───────────────────────────────────────────────────────
  - type: web
    name: geocollect-geo-api
    runtime: python
    plan: starter
    rootDir: geo-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: GEOSERVER_URL
        value: ""
      - key: GEOSERVER_USER
        value: admin
      - key: GEOSERVER_PASS
        value: ""
      - key: API_SERVICE_URL
        value: "https://geocollect-api.onrender.com"

  # ── Next.js Studio (Form Builder) ────────────────────────────────────────
  - type: web
    name: geocollect-studio
    runtime: node
    plan: starter
    rootDir: studio
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: "https://geocollect-api.onrender.com"
      - key: NEXT_PUBLIC_GEO_API_URL
        value: "https://geocollect-geo-api.onrender.com"
      - key: NEXT_PUBLIC_FIELD_URL
        value: "https://geocollect-field.onrender.com"

  # ── React PWA Field (web version) ────────────────────────────────────────
  - type: web
    name: geocollect-field
    runtime: node
    plan: starter
    rootDir: field
    buildCommand: npm ci && npm run build
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: "https://geocollect-api.onrender.com"
      - key: VITE_GEO_API_URL
        value: "https://geocollect-geo-api.onrender.com"

  # ── Portal ────────────────────────────────────────────────────────────────
  - type: web
    name: geocollect-portal
    runtime: node
    plan: starter
    rootDir: portal
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3004"
      - key: NEXT_PUBLIC_API_URL
        value: "https://geocollect-api.onrender.com"
      - key: NEXT_PUBLIC_GEO_API_URL
        value: "https://geocollect-geo-api.onrender.com"
